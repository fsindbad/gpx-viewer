<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frankies Genius GPX Viewer</title>

  <!-- Leaflet CSS von CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

  <style>
    :root {
      font-family: system-ui, Avenir, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      font-weight: 400;
      color-scheme: light dark;
      color: rgba(255, 255, 255, 0.87);
      background-color: #242424;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      display: flex;
      place-items: center;
      min-width: 320px;
      min-height: 100vh;
    }

    #app {
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: 3.2em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    input[type="file"] {
      font-family: inherit;
      font-size: 1em;
      color: inherit;
      cursor: pointer;
    }

    button {
      border-radius: 8px;
      border: 1px solid transparent;
      padding: 0.6em 1.2em;
      font-size: 1em;
      font-weight: 500;
      font-family: inherit;
      background-color: #1a1a1a;
      color: inherit;
      cursor: pointer;
      transition: border-color 0.25s;
    }
    button:hover {
      border-color: #646cff;
    }

    #map {
      height: 500px;
      margin-top: 1rem;
      border-radius: 8px;
    }

    #info {
      margin-top: 0.8rem;
      font-size: 0.9em;
      color: #aaa;
      min-height: 1.4em;
    }

    @media (prefers-color-scheme: light) {
      :root {
        color: #213547;
        background-color: #ffffff;
      }
      button {
        background-color: #f9f9f9;
      }
      #info {
        color: #555;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>Frankies Genius GPX Viewer</h1>

    <input type="file" id="gpxInput" accept=".gpx" />
    <p id="info">GPX-Datei auswählen oder per URL laden</p>

    <div id="map"></div>
  </div>

  <!-- Leaflet JS von CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
  <!-- leaflet-gpx von unpkg -->
  <script src="https://unpkg.com/leaflet-gpx@2.2.0/gpx.js"></script>

  <script>
    // Karte initialisieren
    const map = L.map('map').setView([47.5, 13.5], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // Aktuell geladene GPX-Layer merken (zum Entfernen)
    let currentLayer = null;

    function clearCurrentLayer() {
      if (currentLayer) {
        map.removeLayer(currentLayer);
        currentLayer = null;
      }
    }

    // GPX aus String laden (FileReader)
    function loadGpxFromString(xmlText, filename) {
      clearCurrentLayer();
      document.getElementById('info').textContent = 'Lade ' + filename + ' …';

      currentLayer = new L.GPX(xmlText, {
        async: true,
        marker_options: {
          startIconUrl: null,
          endIconUrl: null,
          shadowUrl: null,
        },
      })
      .on('loaded', function (e) {
        map.fitBounds(e.target.getBounds());
        const dist = e.target.get_distance ? (e.target.get_distance() / 1000).toFixed(2) : null;
        document.getElementById('info').textContent =
          filename + (dist ? ' — ' + dist + ' km' : ' geladen');
      })
      .on('error', function () {
        document.getElementById('info').textContent = 'Fehler beim Laden der GPX-Datei.';
      })
      .addTo(map);
    }

    // GPX von URL laden
    function loadGpxFromUrl(url) {
      clearCurrentLayer();
      document.getElementById('info').textContent = 'Lade ' + url + ' …';

      currentLayer = new L.GPX(url, {
        async: true,
        marker_options: {
          startIconUrl: null,
          endIconUrl: null,
          shadowUrl: null,
        },
      })
      .on('loaded', function (e) {
        map.fitBounds(e.target.getBounds());
        const dist = e.target.get_distance ? (e.target.get_distance() / 1000).toFixed(2) : null;
        document.getElementById('info').textContent =
          url + (dist ? ' — ' + dist + ' km' : ' geladen');
      })
      .on('error', function () {
        document.getElementById('info').textContent = 'Fehler beim Laden der GPX-Datei.';
      })
      .addTo(map);
    }

    // Datei-Upload
    document.getElementById('gpxInput').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (event) {
        loadGpxFromString(event.target.result, file.name);
      };
      reader.readAsText(file);
    });

    // Auto-load Beispiel-Track (wenn auf dem Server vorhanden)
    // loadGpxFromUrl('/tracks/sample1.gpx');
  </script>
</body>
</html>
